<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kopi O Tycoon">
<meta name="theme-color" content="#0f0800">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%23f59e0b'/><text x='50' y='74' font-size='62' text-anchor='middle'>%E2%98%95</text></svg>">
<title>Kopi O King Tycoon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:#0f0800;color:#fef3c7;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  user-select:none;
}
:root{
  --bg:#0f0800;--surf:#1a0e04;--card:#2d1a08;--border:#4a2e0e;
  --amber:#f59e0b;--green:#22c55e;--red:#ef4444;--text:#fef3c7;--muted:#9c7a4a;
}

/* ── Header ── */
#gfx-header{
  flex-shrink:0;background:var(--surf);padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:2px solid var(--amber);
}
.gh-left .title{font-size:15px;font-weight:800;color:var(--amber);}
.gh-left .daytag{font-size:11px;color:var(--muted);margin-top:1px;letter-spacing:.5px;}
.gh-right{text-align:right;}
#cash-display{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
#profit-display{font-size:11px;color:var(--muted);margin-top:2px;}
.pos{color:var(--green);}
.neg{color:var(--red);}

/* ── Content (scrollable) ── */
#gfx-content{
  flex:1;overflow-y:auto;min-height:0;
  padding:10px 12px;display:flex;flex-direction:column;gap:10px;
}
#gfx-content::-webkit-scrollbar{width:4px;}
#gfx-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── Footer ── */
#gfx-footer{
  flex-shrink:0;padding:10px 12px;background:var(--surf);
  border-top:1px solid var(--border);
}
.footer-btn{
  width:100%;padding:14px;background:var(--amber);border:none;
  color:#1c0e04;font-size:15px;font-weight:800;border-radius:10px;
  cursor:pointer;font-family:inherit;letter-spacing:.3px;
}
.footer-btn:active{opacity:.8;}
.footer-btn.secondary{background:var(--surf);color:var(--text);border:1px solid var(--border);}

/* ── Section cards ── */
.section{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.section-head{
  padding:10px 12px 8px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.section-head .sh-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.section-head .sh-val{font-size:13px;font-weight:700;color:var(--amber);}
.section-body{padding:10px 12px;}

/* ── Metrics bars ── */
.metric-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.met-icon{font-size:15px;width:20px;flex-shrink:0;text-align:center;}
.met-label{font-size:12px;color:var(--muted);width:88px;flex-shrink:0;}
.met-bar-w{flex:1;height:7px;background:#1a0a00;border-radius:3px;overflow:hidden;}
.met-bar-f{height:100%;border-radius:3px;transition:width .4s;}
.met-val{font-size:12px;font-weight:700;min-width:28px;text-align:right;color:var(--text);}
.met-delta{font-size:10px;min-width:20px;text-align:right;}

/* ── Decision options ── */
.dec-group{padding:10px 12px;border-bottom:1px solid var(--border);}
.dec-group:last-child{border-bottom:none;}
.dec-label{font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:600;letter-spacing:.5px;}
.dec-opts{display:flex;gap:6px;flex-wrap:wrap;}
.dec-opt{
  flex:1;min-width:70px;padding:8px 6px;background:var(--surf);
  border:1px solid var(--border);border-radius:7px;cursor:pointer;
  font-family:inherit;color:var(--text);font-size:12px;text-align:center;
  transition:all .15s;line-height:1.3;
}
.dec-opt:active{opacity:.7;}
.dec-opt.sel{background:#3a2200;border-color:var(--amber);color:var(--amber);}
.dec-opt .opt-main{font-weight:700;font-size:13px;}
.dec-opt .opt-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.dec-opt.sel .opt-sub{color:#b8820a;}

/* ── Event card ── */
.event-card{background:var(--card);border-radius:12px;border:2px solid var(--amber);overflow:hidden;}
.event-head{background:linear-gradient(135deg,#2d1a08,#1a0e04);padding:14px 14px 10px;}
.event-emoji-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.event-big-emoji{font-size:36px;}
.event-cat{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--amber);text-transform:uppercase;}
.event-ttl{font-size:18px;font-weight:800;color:var(--text);}
.event-speaker{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}
.event-body{padding:12px 14px;background:#200f00;}
.event-narrative{font-size:14px;color:var(--text);line-height:1.65;}
.event-choices{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.choice-btn{
  width:100%;padding:11px 14px;border-radius:8px;
  background:var(--surf);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;text-align:left;
  display:flex;align-items:flex-start;gap:10px;line-height:1.4;
  transition:background .15s;
}
.choice-btn:active{background:#3a2200;}
.choice-btn .ch-key{font-size:14px;font-weight:800;color:var(--amber);flex-shrink:0;}
.choice-btn .ch-body{flex:1;}
.choice-btn .ch-label{display:block;}
.choice-btn .ch-note{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
.advisor-btn{
  margin:0 14px 14px;padding:10px 14px;width:calc(100% - 28px);
  background:transparent;border:1px dashed #5a4020;border-radius:8px;
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.advisor-btn:active{background:#2a1a08;}

/* ── P&L Receipt ── */
.receipt{
  background:#0a0500;border-radius:10px;border:1px solid #3a2208;
  font-family:'Courier New',Courier,monospace;overflow:hidden;
}
.rcpt-head{
  background:#1a0e04;padding:10px 14px;text-align:center;
  border-bottom:1px dashed #3a2208;
}
.rcpt-title{font-size:13px;font-weight:700;color:var(--amber);letter-spacing:2px;}
.rcpt-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.rcpt-body{padding:10px 14px;}
.rcpt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;}
.rcpt-row.sub{font-size:11px;color:var(--muted);}
.rcpt-row.sep{border-top:1px dashed #3a2208;margin-top:4px;padding-top:7px;}
.rcpt-row .rk{color:var(--text);}
.rcpt-row .rv{font-weight:700;min-width:70px;text-align:right;}
.rcpt-stat-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;font-family:inherit;}
.rcpt-stat-row .rsk{color:var(--muted);width:100px;}
.rcpt-stat-row .rold{color:var(--muted);}
.rcpt-stat-row .rarrow{color:var(--muted);}
.rcpt-stat-row .rnew{font-weight:700;}
.rcpt-stat-row .rdelta{font-size:11px;margin-left:4px;}

/* ── Overlay panels ── */
.overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);
  display:none;flex-direction:column;align-items:center;justify-content:flex-end;
}
.overlay.show{display:flex;}
.overlay-sheet{
  background:var(--surf);border-radius:20px 20px 0 0;border-top:2px solid var(--border);
  width:100%;max-height:80dvh;overflow-y:auto;padding:16px;
}
.overlay-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.overlay-title{font-size:15px;font-weight:700;color:var(--amber);margin-bottom:12px;}
.advisor-bubble{
  background:#1a1000;border:1px solid #5a4010;border-radius:10px;
  padding:14px;font-size:14px;color:var(--text);line-height:1.65;margin-bottom:10px;
}
.advisor-speaker{font-size:11px;color:var(--amber);margin-bottom:6px;font-weight:700;}
.ol-close{
  width:100%;padding:12px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;
}

/* Settings */
.settings-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;letter-spacing:.5px;}
.settings-input{
  width:100%;padding:10px 12px;background:#0f0800;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:12px;
}
.settings-input:focus{outline:none;border-color:var(--amber);}
.model-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.model-opt{
  padding:10px 12px;background:#0f0800;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;text-align:left;
}
.model-opt.sel{border-color:var(--amber);color:var(--amber);}

/* Game over / Win */
#overlay-end{
  position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
#overlay-end.show{display:flex;}
.end-box{
  background:var(--surf);border-radius:16px;padding:28px 22px;
  text-align:center;width:100%;max-width:320px;border:2px solid var(--amber);
}
.end-emoji{font-size:56px;margin-bottom:10px;}
.end-title{font-size:22px;font-weight:800;color:var(--amber);margin-bottom:6px;}
.end-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px;}
.end-btn{
  width:100%;padding:13px;background:var(--amber);border:none;
  color:#1c0e04;font-size:14px;font-weight:800;border-radius:8px;cursor:pointer;font-family:inherit;
}

/* Toast */
#toast{
  display:none;position:fixed;bottom:90px;left:50%;
  background:var(--surf);border:2px solid var(--amber);border-radius:12px;
  padding:10px 18px;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;z-index:300;max-width:92%;pointer-events:none;
}
#toast.show{display:flex;animation:toastIn 3.5s ease forwards;}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,8px)}12%{opacity:1;transform:translate(-50%,0)}80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-6px)}}

/* Onboarding */
#onboard{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;overflow:hidden;transition:opacity .4s;}
#onboard::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.15) 3px,rgba(0,0,0,.15) 4px);}
.ob-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:24px 20px 16px;opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:1;}
.ob-slide.active{opacity:1;pointer-events:all;}
.ob-top{display:flex;justify-content:center;flex-shrink:0;}
.ob-badge{font-size:10px;font-weight:700;letter-spacing:3px;color:#22d3ee;text-transform:uppercase;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.3);padding:4px 14px;border-radius:3px;}
.ob-art{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;padding:12px 0;}
.ob-art svg{image-rendering:pixelated;max-height:220px;max-width:min(280px,90vw);width:auto;height:auto;display:block;}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ob-art-anim svg{animation:artPulse 2.2s ease-in-out infinite;}
.ob-text{flex-shrink:0;text-align:center;padding:0 4px;}
.ob-big-title{font-size:28px;font-weight:800;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:6px;text-shadow:0 0 24px rgba(245,158,11,.4);}
.ob-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.ob-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:10px;}
.ob-story{font-size:14px;color:var(--text);line-height:1.7;max-width:300px;margin:0 auto;}
.ob-nav{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:18px;flex-shrink:0;}
.ob-skip{background:transparent;border:1px solid #2a1a0a;color:#5a3a1a;font-size:12px;padding:9px 16px;border-radius:6px;cursor:pointer;font-family:inherit;}
.ob-next{background:var(--amber);border:none;color:#1c0e04;font-size:13px;font-weight:700;padding:10px 20px;border-radius:6px;cursor:pointer;font-family:inherit;letter-spacing:.5px;}
.ob-dots{display:flex;gap:7px;align-items:center;}
.ob-dot{width:8px;height:8px;border-radius:50%;background:#1a0a04;border:1px solid #3a1a08;transition:all .2s;}
.ob-dot.active{background:var(--amber);border-color:var(--amber);}
</style>
</head>
<body>

<div id="onboard"></div>
<div id="overlay-advisor" class="overlay">
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title">☕ Uncle Ah Kow says…</div>
    <div class="advisor-speaker">Your most experienced staff member</div>
    <div class="advisor-bubble" id="advisor-text">Uncle Ah Kow is thinking…</div>
    <button class="ol-close" onclick="closeOverlay('overlay-advisor')">Got it, I'll decide now</button>
  </div>
</div>
<div id="overlay-settings" class="overlay">
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title">⚙️ Settings</div>
    <div class="settings-label">GEMINI API KEY (for Uncle Ah Kow advisor)</div>
    <input class="settings-input" id="apikey-input" type="password" placeholder="Paste your Gemini API key here" autocomplete="off">
    <div class="settings-label">AI MODEL</div>
    <div class="model-opts" id="model-opts"></div>
    <button class="ol-close" style="margin-bottom:10px;" onclick="saveSettings()">Save Settings</button>
    <button class="ol-close" onclick="closeOverlay('overlay-settings')">Cancel</button>
  </div>
</div>
<div id="overlay-end">
  <div class="end-box" id="end-box"></div>
</div>

<div id="gfx-header">
  <div class="gh-left">
    <div class="title">☕ KOPI O KING</div>
    <div class="daytag" id="day-tag">Day 1 · Branch 1</div>
  </div>
  <div class="gh-right">
    <div id="cash-display" class="pos">$5,000</div>
    <div id="profit-display">avg profit —</div>
  </div>
</div>

<div id="gfx-content"></div>

<div id="gfx-footer">
  <button class="footer-btn" id="footer-btn" onclick="footerAction()">Open For Business →</button>
</div>

<div id="toast"></div>

<script>
// ── SW registration — M3: FIRST ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Onboarding ────────────────────────────────────────────────────────────────
const OB_KEY = 'koptyc-intro-v1';
const OB_PAL = {
  A:'#f59e0b',D:'#92400e',W:'#fef3c7',K:'#1c0e04',
  S:'#78716c',R:'#dc2626',Y:'#fbbf24',C:'#22d3ee',
  M:'#292524',L:'#e2d9c8',B:'#1d4ed8',P:'#7c3aed',
};
function renderPx(rows, px) {
  const H=rows.length, W=Math.max(...rows.map(r=>r.length));
  let o=`<svg viewBox="0 0 ${W*px} ${H*px}" xmlns="http://www.w3.org/2000/svg">`;
  for(let y=0;y<H;y++)for(let x=0;x<rows[y].length;x++){
    const c=rows[y][x]; if(c==='.'||!OB_PAL[c])continue;
    o+=`<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${OB_PAL[c]}"/>`;
  }
  return o+'</svg>';
}
const CUP_ART=['.....CC.CC...','......C.C....','.............',
  '....AAAAAAA..','...AAAAAAAAA.','...A.MMMMMA.A','...A.MMMMMA..',
  '...A.MMMMMA.A','...A.MMMMMA..','...AAAAAAAAA.','....AAAAAAA..','..AAAAAAAAAAA'];
const UNCLE_ART=['....DDDD....','...DDDDDD...','...DDDDDD...','...DMDDMD...',
  '...DDDDDD...','....MDDM....','..DDDDDDDD..','..WWWWWWWW..','.WWWWWWWWWW.',
  '.WWWWWWWWWW.','..WWWWWWWW..','..SS....SS..','..KK....KK..'];
const CHART_ART=['............','..AAAA......','..AAAA......','..AAAADD....',
  '..AAAADD....','..AAAADDYY..','..AAAAddyy..','AAAAAAAAYYY.','AAAAAAAAYYY.',
  'AAAAAAAAYYYW','AAAAAAAAYYYW','AAAAAAAAYYYW'];
const TROPHY_ART=['...CC..CC...','..C......C..','...CC..CC...',
  '............','....AAAA....','...AAAAAA...','..AAAAAAAA..','..A.YYYY.A..',
  '..AAAAAAAA...','...AAAAAA...','....AAAA.....','AAAAAAAAAAAAA'];
const SLIDES=[
  {bg:'#050512',badge:'✦ SEGA PRESENTS ✦',art:CUP_ART,anim:true,bigTitle:'KOPI O KING',sub:'Tycoon Edition',story:null},
  {bg:'#0a0400',badge:'● YOUR INHERITANCE ●',art:UNCLE_ART,title:'THE STALL IS YOURS',
    story:'Your grandfather left you his kopitiam. $5,000 in savings. One helper. A secret kopi recipe.\nCan you build a business empire from nothing?'},
  {bg:'#06000e',badge:'★ YOUR DECISIONS ★',art:CHART_ART,title:'EVERY DAY COUNTS',
    story:'Choose your bean source. Set your price. Manage your staff.\nHandle crises. Every decision changes your profit, your reputation, your future.'},
  {bg:'#020a04',badge:'▶ YOUR MISSION ◀',art:TROPHY_ART,title:'5 BRANCHES. ONE EMPIRE.',last:true,
    story:'Start with one stall. Make smart decisions.\nSave up. Expand.\nBuild 5 profitable branches.\nBecome the KOPI O KING.'},
];
function buildOnboarding(){
  const el=document.getElementById('onboard');
  el.innerHTML=SLIDES.map((s,i)=>{
    const artCls='ob-art'+(s.anim?' ob-art-anim':'');
    const textHtml=s.bigTitle
      ?`<div class="ob-big-title">${s.bigTitle}</div><div class="ob-sub">${s.sub}</div>`
      :`<div class="ob-title">${s.title}</div><div class="ob-story">${s.story.replace(/\n/g,'<br>')}</div>`;
    const dots=SLIDES.map((_,j)=>`<div class="ob-dot${j===i?' active':''}"></div>`).join('');
    const nFn=s.last?'closeOnboard()':`obNext(${i})`;
    return `<div class="ob-slide${i===0?' active':''}" id="ob-${i}" style="background:${s.bg};">
      <div class="ob-top"><span class="ob-badge">${s.badge}</span></div>
      <div class="${artCls}">${renderPx(s.art,10)}</div>
      <div class="ob-text">${textHtml}</div>
      <div class="ob-nav">
        <button class="ob-skip" onclick="closeOnboard()">Skip</button>
        <div class="ob-dots">${dots}</div>
        <button class="ob-next" onclick="${nFn}">${s.last?'START PLAYING ▶':'NEXT ▶'}</button>
      </div></div>`;
  }).join('');
}
function obNext(i){
  document.getElementById('ob-'+i).classList.remove('active');
  document.getElementById('ob-'+(i+1)).classList.add('active');
}
function closeOnboard(){
  localStorage.setItem(OB_KEY,'done');
  const el=document.getElementById('onboard');
  el.style.opacity='0';
  setTimeout(()=>{el.style.display='none';el.style.opacity='';},420);
}
function openOnboard(){buildOnboarding();document.getElementById('onboard').style.display='flex';}

// ── Game constants ────────────────────────────────────────────────────────────
const BEANS={
  malaysia: {label:'Malaysia',emoji:'🇲🇾',cost:0.30,quality:48,satGrow:0.4, repGrow:0.0,desc:'Cheap, reliable'},
  indonesia:{label:'Indonesia',emoji:'🇮🇩',cost:0.45,quality:62,satGrow:0.8, repGrow:0.1,desc:'Good balance'},
  colombia: {label:'Colombia', emoji:'🇨🇴',cost:0.80,quality:82,satGrow:1.5, repGrow:0.4,desc:'Great quality'},
  roastery: {label:'Roastery', emoji:'🏭', cost:1.10,quality:95,satGrow:2.5, repGrow:0.8,desc:'Excellent, stockout risk',stockout:0.15},
};
const PRICES=[
  {v:1.20,label:'$1.20',desc:'Budget — more customers',  custMult:1.35,satMod:2},
  {v:1.50,label:'$1.50',desc:'Standard',                 custMult:1.00,satMod:0},
  {v:1.80,label:'$1.80',desc:'Premium — less customers', custMult:0.72,satMod:-4},
  {v:2.00,label:'$2.00',desc:'Very premium',             custMult:0.52,satMod:-8},
];
const HOURS=[

function defaultState(){

    day:1, phase:'morning',
    cash:5000, totalRevenue:0, totalProfit:0,
    satisfaction:65, reputation:45, staffMorale:78, beanQuality:48,
    beanSource:'malaysia', price:1.50, hours:'standard',
    staffCount:1, extraRentMod:0,
    branches:1, branchIncome:0,
    firedEvents:[], activeEffects:[],
    pendingEvent:null, lastResults:null,
    profitHistory:[],
    won:false, lost:false,
    geminiKey:'', geminiModel:'gemini-2.5-flash',
    savedAt:null,
  };
}
let gs = defaultState();

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n){
  if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return '$'+(n/1e3).toFixed(1)+'K';
  if(n<0)return '-$'+Math.abs(Math.round(n));
  return '$'+Math.round(n);
}
function fmtP(n){return (n>=0?'+':'')+fmt(n);}
function fmtT(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0)return h+'h '+m+'m'; return m+'m '+Math.floor(s%60)+'s';
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ── IDB ───────────────────────────────────────────────────────────────────────
let db=null;
function initDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('koptycoonDB',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('save')) d.createObjectStore('save',{keyPath:'id'}); // M7
    };
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=()=>rej(r.error);
  });
}
function saveGame(){
  if(!db)return;
  gs.savedAt=new Date().toISOString();
  const data={id:'game',...gs,firedEvents:[...gs.firedEvents]};
  const tx=db.transaction('save','readwrite');
  tx.objectStore('save').put(data);
}
function loadGame(){
  if(!db)return Promise.resolve();
  return new Promise(res=>{
    const r=db.transaction('save','readonly').objectStore('save').get('game');
    r.onsuccess=()=>{
      const d=r.result;
      if(d){
        Object.assign(gs,d);
        gs.firedEvents=new Set(d.firedEvents||[]);
      }
      res();
    };
    r.onerror=res;
  });
}

// ── Revenue calculation ───────────────────────────────────────────────────────
function calcDay(){
  const bean=BEANS[gs.beanSource];
  const priceOpt=PRICES.find(p=>p.v===gs.price)||PRICES[1];
  const hoursOpt=HOURS.find(h=>h.v===gs.hours)||HOURS[0];
  const BASE=200;
  const satMult=0.50+(gs.satisfaction/100)*0.50;
  const repMult=0.45+(gs.reputation/100)*0.65;
  const moraleMult=gs.staffMorale<50?0.82:gs.staffMorale>78?1.08:1.0;
  const capacity=120+(gs.staffCount*80);
  let cMult=priceOpt.custMult*hoursOpt.custMult;
  let cBonus=0;
  let pMod=1.0;
  for(const fx of gs.activeEffects){
    if(fx.type==='custMult')  cMult*=fx.v;
    if(fx.type==='custBonus') cBonus+=fx.v;
    if(fx.type==='profitMod') pMod*=(1+fx.v);
  }
  const raw=BASE*satMult*repMult*moraleMult*cMult+cBonus;
  const customers=Math.min(capacity,Math.max(0,Math.floor(raw)));
  const revenue=customers*gs.price;
  const beanCost=customers*bean.cost;
  const staffCost=gs.staffCount*70+hoursOpt.extraCost;
  const rent=27*(1+gs.extraRentMod);
  const gross=revenue-beanCost-staffCost-rent;
  const branchInc=gs.branchIncome||0;
  const profit=(gross+branchInc)*pMod;
  return {customers,revenue,beanCost,staffCost,rent,gross,branchInc,profit};
}

// ── Apply event choice ────────────────────────────────────────────────────────
function applyChoice(choice){
  const fx=choice.fx||{};
  if(fx.cost>0)gs.cash-=fx.cost;  // legacy cost field in choice root
  if(choice.cost)gs.cash-=choice.cost;
  if(fx.cash)gs.cash+=fx.cash;
  if(fx.sat)    gs.satisfaction=clamp(gs.satisfaction+fx.sat,0,100);
  if(fx.rep)    gs.reputation=clamp(gs.reputation+fx.rep,0,100);
  if(fx.morale) gs.staffMorale=clamp(gs.staffMorale+fx.morale,0,100);
  if(fx.staff)  gs.staffCount=Math.max(1,gs.staffCount+(fx.staff||0));
  if(fx.staffCostAdd) gs.staffCostAdd=(gs.staffCostAdd||0)+(fx.staffCostAdd*30); // monthly
  if(fx.custMult!==undefined && fx.dur) addEffect('custMult',fx.custMult,fx.dur);
  if(fx.custBonus && fx.dur) addEffect('custBonus',fx.custBonus,fx.dur);
  else if(fx.custBonus) addEffect('custBonus',fx.custBonus,999);
  if(fx.profitMod && fx.dur) addEffect('profitMod',fx.profitMod,fx.dur);
  else if(fx.profitMod) addEffect('profitMod',fx.profitMod,999);
  if(fx._rentMod) gs.extraRentMod=clamp((gs.extraRentMod||0)+fx._rentMod,0,1);
  if(fx._priceSet) gs.price=fx._priceSet;
  if(fx._priceAdd) gs.price=clamp(gs.price+(fx._priceAdd||0),1.20,2.00);
  if(fx._beanDowngrade){
    const order=['malaysia','indonesia','colombia','roastery'];
    const i=order.indexOf(gs.beanSource);
    if(i>0)gs.beanSource=order[i-1];
    gs.beanQuality=BEANS[gs.beanSource].quality;
  }
  if(fx._gamble==='inspector'){
    if(Math.random()<0.60){gs.cash-=800;showToast('⚠️','NEA fined you $800. Should have cleaned up lah.');}
    else{showToast('😅','Lucky! Inspector gave you a warning only.');}
  }
  if(fx._gamble==='pipe'){addEffect('_pipeLeak',true,Math.floor(7+Math.random()*7));}
  if(fx._newBranch){openBranch(fx._newBranch);}
}
function addEffect(type,v,dur){
  gs.activeEffects.push({type,v,daysLeft:dur});
}

// ── Branch management ─────────────────────────────────────────────────────────
function openBranch(n){
  gs.branches=n;
  const incomes={2:80,3:120,4:200,5:350};
  gs.branchIncome=(gs.branchIncome||0)+(incomes[n]||100);
  showToast('🏪',`Branch ${n} opening in 14 days! Exciting times!`);
  addEffect('custMult',0.5,3); // distraction during setup
}

// ── Event selection ───────────────────────────────────────────────────────────
function selectEvent(){
  // Story events (specific day)
  for(const ev of EVENTS){
    if(ev.trigger.type==='story' && ev.trigger.day===gs.day && !gs.firedEvents.has(ev.id)){
      return ev;
    }
  }
  // Threshold events (cash + branches)
  for(const ev of EVENTS){
    if(ev.trigger.type==='threshold' && !gs.firedEvents.has(ev.id)){
      const cashOk = !ev.trigger.cash || gs.cash>=ev.trigger.cash;
      const branchOk = !ev.trigger.branches || gs.branches>=ev.trigger.branches;
      if(cashOk && branchOk) return ev;
    }
  }
  // Random events (30% chance per day)
  if(Math.random()>0.30) return null;
  const eligible=EVENTS.filter(ev=>
    ev.trigger.type==='random' &&
    (!ev.trigger.minDay || gs.day>=ev.trigger.minDay) &&
    (ev.repeatable || !gs.firedEvents.has(ev.id))
  );
  if(!eligible.length) return null;
  const total=eligible.reduce((s,ev)=>s+(ev.trigger.prob||0.03),0);
  let r=Math.random()*total;
  for(const ev of eligible){r-=(ev.trigger.prob||0.03);if(r<=0)return ev;}
  return eligible[Math.floor(Math.random()*eligible.length)];
}

// ── Day-end processing ────────────────────────────────────────────────────────
function processEndDay(fromEvent=false){
  const res=calcDay();
  gs.cash+=res.profit;
  gs.totalRevenue+=res.revenue;
  gs.totalProfit+=res.profit;
  gs.profitHistory.push(res.profit);
  if(gs.profitHistory.length>30)gs.profitHistory.shift();
  gs.lastResults=res;
  // Stat drift
  const bean=BEANS[gs.beanSource];
  const priceOpt=PRICES.find(p=>p.v===gs.price)||PRICES[1];
  gs.satisfaction=clamp(gs.satisfaction+bean.satGrow*0.4+priceOpt.satMod*0.2-0.2,5,100);
  gs.reputation=clamp(gs.reputation+bean.repGrow*0.3+0.15,0,100);
  gs.beanQuality=clamp(bean.quality*0.3+gs.beanQuality*0.7,0,100); // moving average
  const hoursOpt=HOURS.find(h=>h.v===gs.hours)||HOURS[0];
  gs.staffMorale=clamp(gs.staffMorale+hoursOpt.moraleMod*0.25+0.3,0,100);
  // Stockout check
  if(gs.beanSource==='roastery'&&Math.random()<0.15){
    gs.satisfaction=clamp(gs.satisfaction-10,5,100);
    showToast('⚠️','Roastery stock ran out! Some customers turned away!');
  }
  // Pipe leak gamble resolve
  const leak=gs.activeEffects.find(f=>f.type==='_pipeLeak');
  if(leak&&Math.random()<0.3){
    gs.cash-=1200;
    gs.activeEffects=gs.activeEffects.filter(f=>f!==leak);
    showToast('💧','Patch failed! Emergency plumber: $1,200!');
  }
  // Decrement effects
  gs.activeEffects=gs.activeEffects.map(f=>({...f,daysLeft:f.daysLeft-1})).filter(f=>f.daysLeft>0);
  gs.phase='endday';
  saveGame();
  render();
}

// ── Footer action dispatcher ──────────────────────────────────────────────────
function footerAction(){
  if(gs.phase==='morning'){
    // Check for event
    const ev=selectEvent();
    if(ev){
      gs.firedEvents.add(ev.id);
      gs.pendingEvent=ev;
      gs.phase='event';
      saveGame();
      render();
    }else{
      processEndDay();
    }
  }else if(gs.phase==='endday'){
    gs.day++;
    checkWinLose();
    gs.phase='morning';
    saveGame();
    render();
  }
}
function chooseOption(idx){
  if(!gs.pendingEvent)return;
  applyChoice(gs.pendingEvent.choices[idx]);
  gs.pendingEvent=null;
  processEndDay(true);
}

// ── Win / Lose check ──────────────────────────────────────────────────────────
function checkWinLose(){
  if(gs.cash<0){
    gs.lost=true;
    const box=document.getElementById('end-box');
    box.innerHTML=`<div class="end-emoji">😢</div>
      <div class="end-title">BANKRUPT</div>
      <div class="end-sub">You ran out of cash on Day ${gs.day}. The kopitiam had to close. Even your grandfather's secret recipe couldn't save it this time.</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">💡 Tip: Buy cheaper beans early. Don't hire staff faster than revenue grows.</div>
      <button class="end-btn" onclick="startFresh()">Try Again</button>`;
    document.getElementById('overlay-end').classList.add('show');
    return;
  }
  const avg30=gs.profitHistory.length>=30
    ?gs.profitHistory.reduce((a,b)=>a+b,0)/gs.profitHistory.length:0;
  if(gs.branches>=5 && avg30>=500){
    gs.won=true;
    const box=document.getElementById('end-box');
    box.innerHTML=`<div class="end-emoji">👑</div>
      <div class="end-title">KOPI O KING!</div>
      <div class="end-sub">5 branches. ${fmt(gs.totalRevenue)} total revenue. ${gs.day} days of hustle. Your grandfather would be proud.</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Share your score!</div>
      <button class="end-btn" onclick="startFresh()">Play Again</button>`;
    document.getElementById('overlay-end').classList.add('show');
  }
}
function startFresh(){
  const key=gs.geminiKey, model=gs.geminiModel;
  gs=defaultState();
  gs.geminiKey=key; gs.geminiModel=model;
  gs.firedEvents=new Set();
  document.getElementById('overlay-end').classList.remove('show');
  saveGame(); render();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTm=null;
function showToast(emoji,msg){
  const el=document.getElementById('toast');
  el.innerHTML=`<span style="font-size:18px">${emoji}</span><span style="margin-left:6px">${msg}</span>`;
  el.style.animation='none';void el.offsetWidth;
  el.classList.add('show');el.style.animation='';
  if(toastTm)clearTimeout(toastTm);
  toastTm=setTimeout(()=>el.classList.remove('show'),3700);
}

// ── Overlays ──────────────────────────────────────────────────────────────────
function openOverlay(id){document.getElementById(id).classList.add('show');}
function closeOverlay(id){document.getElementById(id).classList.remove('show');}
function openSettings(){
  document.getElementById('apikey-input').value=gs.geminiKey||'';
  const opts=document.getElementById('model-opts');
  opts.innerHTML=MODELS.map(m=>`<button class="model-opt${m===gs.geminiModel?' sel':''}" onclick="selectModel('${m}')">${m}</button>`).join('');
  openOverlay('overlay-settings');
}
function selectModel(m){
  gs.geminiModel=m;
  document.querySelectorAll('.model-opt').forEach(b=>b.classList.toggle('sel',b.textContent===m));
}
function saveSettings(){
  gs.geminiKey=document.getElementById('apikey-input').value.trim();
  saveGame();closeOverlay('overlay-settings');
  showToast('✅','Settings saved!');
}

// ── Gemini advisor ────────────────────────────────────────────────────────────
async function askAdvisor(){
  openOverlay('overlay-advisor');
  document.getElementById('advisor-text').textContent='Uncle Ah Kow is thinking…';
  if(!gs.geminiKey){
    document.getElementById('advisor-text').textContent='Set your Gemini API key in ⚙️ Settings to unlock Uncle Ah Kow\'s advice!';
    return;
  }
  const ev=gs.pendingEvent;
  if(!ev)return;
  const avg=gs.profitHistory.length?Math.round(gs.profitHistory.reduce((a,b)=>a+b,0)/gs.profitHistory.length):0;
  const prompt=`You are Uncle Ah Kow, a 65-year-old seasoned kopitiam owner in Singapore. Your nephew just inherited your stall. You give brief, practical business advice in Singlish. Maximum 3 sentences. Be warm but direct about risk.

Current situation: Day ${gs.day}, Cash ${fmt(gs.cash)}, Average daily profit ${fmtP(avg)}, Satisfaction ${Math.round(gs.satisfaction)}/100, Staff morale ${Math.round(gs.staffMorale)}/100, Branches: ${gs.branches}.

Event: "${ev.title}" — ${ev.narrative}

Options:
${ev.choices.map((c,i)=>String.fromCharCode(65+i)+'. '+c.label).join('\n')}

Give your honest advice on what to do.`;
  try{
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${gs.geminiModel}:generateContent?key=${gs.geminiKey}`;
    const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:180}})});
    if(!resp.ok){
      const code=resp.status;
      document.getElementById('advisor-text').textContent=`API error ${code}. ${code===403?'Check your API key.':code===404?'Try a different model in Settings.':'Try again later.'}`;
      return;
    }
    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'Uncle Ah Kow busy lah. Try again.';
    document.getElementById('advisor-text').textContent=text;
  }catch(e){
    document.getElementById('advisor-text').textContent='Cannot reach Uncle Ah Kow. Check your internet connection.';
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  renderHeader();
  if(gs.phase==='morning') renderMorning();
  else if(gs.phase==='event') renderEvent();
  else if(gs.phase==='endday') renderEndDay();
}

function renderHeader(){
  document.getElementById('day-tag').textContent=`Day ${gs.day} · ${gs.branches} Branch${gs.branches>1?'es':''}`;
  const cashEl=document.getElementById('cash-display');
  cashEl.textContent=fmt(gs.cash);
  cashEl.className=gs.cash>=0?'pos':'neg';
  const avg=gs.profitHistory.length?Math.round(gs.profitHistory.slice(-7).reduce((a,b)=>a+b,0)/Math.min(7,gs.profitHistory.length)):null;
  document.getElementById('profit-display').textContent=avg!==null
    ?`avg ${fmtP(avg)}/day (last 7)`:'first day — let\'s go!';
}

function bar(val,color){
  return `<div class="met-bar-w"><div class="met-bar-f" style="width:${val}%;background:${color};"></div></div>`;
}
function delta(v){
  if(!gs.lastResults)return'';
  return v>=0?`<span class="met-delta pos">+${v.toFixed(1)}</span>`:`<span class="met-delta neg">${v.toFixed(1)}</span>`;
}

function renderMorning(){
  const yest=gs.lastResults;
  const metrics=`
    <div class="section">
      <div class="section-head"><span class="sh-title">📊 Stall Health</span><button style="background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;" onclick="openSettings()">⚙️ Settings</button><a href="https://ko-fi.com/leanlifestyle" target="_blank" rel="noopener" style="font-size:11px;color:var(--muted);text-decoration:none;">☕ Ko-fi</a></div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:2px;">
        <div class="metric-row"><span class="met-icon">😊</span><span class="met-label">Satisfaction</span>${bar(gs.satisfaction,'#22c55e')}<span class="met-val">${Math.round(gs.satisfaction)}</span></div>
        <div class="metric-row"><span class="met-icon">⭐</span><span class="met-label">Reputation</span>${bar(gs.reputation,'#f59e0b')}<span class="met-val">${Math.round(gs.reputation)}</span></div>
        <div class="metric-row"><span class="met-icon">👷</span><span class="met-label">Staff Morale</span>${bar(gs.staffMorale,'#60a5fa')}<span class="met-val">${Math.round(gs.staffMorale)}</span></div>
        <div class="metric-row"><span class="met-icon">🫘</span><span class="met-label">Bean Quality</span>${bar(gs.beanQuality,'#a3e635')}<span class="met-val">${Math.round(gs.beanQuality)}</span></div>
      </div>
    </div>`;

  const beanOpts=Object.entries(BEANS).map(([k,b])=>`
    <button class="dec-opt${gs.beanSource===k?' sel':''}" onclick="gs.beanSource='${k}';render();">
      <div class="opt-main">${b.emoji} ${b.label}</div>
      <div class="opt-sub">$${b.cost}/cup · Q${b.quality}</div>
    </button>`).join('');
  const priceOpts=PRICES.map(p=>`
    <button class="dec-opt${gs.price===p.v?' sel':''}" onclick="gs.price=${p.v};render();">
      <div class="opt-main">${p.label}</div>
      <div class="opt-sub">${p.desc}</div>
    </button>`).join('');
  const hoursOpts=HOURS.map(h=>`
    <button class="dec-opt${gs.hours===h.v?' sel':''}" onclick="gs.hours='${h.v}';render();">
      <div class="opt-main">${h.label}</div>
      <div class="opt-sub">${h.desc}</div>
    </button>`).join('');
  const staffOpts=`
    <button class="dec-opt" onclick="hireStaff()"><div class="opt-main">+ Hire</div><div class="opt-sub">$200 + $70/day</div></button>
    <button class="dec-opt sel"><div class="opt-main">${gs.staffCount} helper${gs.staffCount>1?'s':''}</div><div class="opt-sub">$${gs.staffCount*70}/day</div></button>
    ${gs.staffCount>1?`<button class="dec-opt" onclick="fireStaff()"><div class="opt-main">− Let go</div><div class="opt-sub">Save $70/day</div></button>`:''}`;

  const decisions=`
    <div class="section">
      <div class="section-head"><span class="sh-title">🎛️ Today's Decisions</span></div>
      <div class="dec-group"><div class="dec-label">🫘 BEAN SOURCE</div><div class="dec-opts">${beanOpts}</div></div>
      <div class="dec-group"><div class="dec-label">💰 PRICE PER CUP</div><div class="dec-opts">${priceOpts}</div></div>
      <div class="dec-group"><div class="dec-label">⏰ OPENING HOURS</div><div class="dec-opts">${hoursOpts}</div></div>
      <div class="dec-group"><div class="dec-label">👷 STAFF (${gs.staffCount+1} people total incl. you)</div><div class="dec-opts">${staffOpts}</div></div>
    </div>`;

  const preview=calcDay();
  const prevEl=`
    <div class="section">
      <div class="section-head"><span class="sh-title">📈 Today's Forecast</span><span class="sh-val">${fmtP(preview.profit)}</span></div>
      <div class="section-body" style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;">
        <div>Expected customers: ~${preview.customers} cups</div>
        <div>Revenue: ${fmt(preview.revenue)} · Costs: ${fmt(preview.beanCost+preview.staffCost+preview.rent)}</div>
        ${gs.branches>1?`<div>Branch income: +${fmt(preview.branchInc)}/day</div>`:''}
      </div>
    </div>`;

  document.getElementById('gfx-content').innerHTML = metrics + decisions + prevEl;
  const fb = document.getElementById('footer-btn');
  fb.textContent = 'Open For Business →';
  fb.className = 'footer-btn';
}

function hireStaff(){if(gs.cash>=200){gs.cash-=200;gs.staffCount++;showToast('👷','New helper hired!');render();}else showToast('❌','Not enough cash to hire!');}
function fireStaff(){if(gs.staffCount>1){gs.staffCount--;gs.staffMorale=clamp(gs.staffMorale-18,0,100);showToast('😔','Staff let go. Morale takes a hit.');render();};}

function renderEvent(){
  const ev=gs.pendingEvent;
  if(!ev){gs.phase='morning';render();return;}
  const choicesHtml=ev.choices.map((c,i)=>`
    <button class="choice-btn" onclick="chooseOption(${i})">
      <span class="ch-key">${String.fromCharCode(65+i)}</span>
      <span class="ch-body"><span class="ch-label">${c.label}</span><span class="ch-note">${c.note||''}</span></span>
    </button>`).join('');
  document.getElementById('gfx-content').innerHTML=`
    <div class="event-card">
      <div class="event-head">
        <div class="event-emoji-row"><span class="event-big-emoji">${ev.emoji}</span><div><div class="event-cat">${ev.cat}</div><div class="event-ttl">${ev.title}</div></div></div>
        <div class="event-speaker">— ${ev.speaker}</div>
      </div>
      <div class="event-body"><p class="event-narrative">${ev.narrative}</p></div>
      <div class="event-choices">${choicesHtml}</div>
      <button class="advisor-btn" onclick="askAdvisor()">
        <span style="font-size:16px">🤖</span><span>Ask Uncle Ah Kow for advice (AI)</span>
      </button>
    </div>`;
  const fb=document.getElementById('footer-btn');
  fb.textContent='Choose your response above';
  fb.className='footer-btn secondary';
  fb.onclick=null;
}

function renderEndDay(){
  const r=gs.lastResults;
  if(!r){gs.phase='morning';render();return;}
  const profSign=r.profit>=0;
  const rows=[
    ['Customers served',r.customers+' cups'],
    ['Revenue','+'+fmt(r.revenue),'pos'],
    ['Bean costs','−'+fmt(r.beanCost),'neg'],
    ['Staff wages','−'+fmt(r.staffCost),'neg'],
    ['Stall rent','−'+fmt(r.rent),'neg'],
  ];
  if(r.branchInc>0)rows.push(['Branch income','+'+fmt(r.branchInc),'pos']);
  const rowHtml=rows.map(([k,v,cls])=>`<div class="rcpt-row${cls?' '+cls:''}"><span class="rk">${k}</span><span class="rv ${cls||''}">${v}</span></div>`).join('');
  const statRows=[
    ['😊 Satisfaction',gs.satisfaction],['⭐ Reputation',gs.reputation],
    ['👷 Morale',gs.staffMorale],['🫘 Bean Quality',gs.beanQuality],
  ].map(([k,v])=>`<div class="rcpt-stat-row"><span class="rsk">${k}</span><span class="rnew ${v>=70?'pos':v<40?'neg':''}">${Math.round(v)}</span></div>`).join('');
  document.getElementById('gfx-content').innerHTML=`
    <div class="receipt">
      <div class="rcpt-head">
        <div class="rcpt-title">☕ CLOSING TIME — DAY ${gs.day}</div>
        <div class="rcpt-sub">Kopi O King Tycoon · Branch ${gs.branches}</div>
      </div>
      <div class="rcpt-body">
        ${rowHtml}
        <div class="rcpt-row sep"><span class="rk" style="font-weight:700;">Net profit</span><span class="rv ${profSign?'pos':'neg'}" style="font-size:16px;">${profSign?'+':''}${fmt(r.profit)}</span></div>
        <div class="rcpt-row" style="margin-top:8px;"><span class="rk">Cash balance</span><span class="rv pos">${fmt(gs.cash)}</span></div>
      </div>
      <div style="padding:8px 14px 12px;border-top:1px dashed #3a2208;">
        <div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;font-family:inherit;">STALL METRICS</div>
        ${statRows}
      </div>
    </div>`;
  const fb=document.getElementById('footer-btn');
  fb.textContent=`Next Day (Day ${gs.day+1}) →`;
  fb.className='footer-btn';
  fb.onclick=footerAction;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  try{await initDB();await loadGame();}catch(e){}
  if(!gs.firedEvents||!(gs.firedEvents instanceof Set)) gs.firedEvents=new Set(gs.firedEvents||[]);
  document.getElementById('footer-btn').onclick=footerAction;
  render();
  if(!localStorage.getItem(OB_KEY)){buildOnboarding();document.getElementById('onboard').style.display='flex';}
}
init();
</script>
