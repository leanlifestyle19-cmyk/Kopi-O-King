<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kopi O King">
<meta name="theme-color" content="#1c0e04">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%23f59e0b'/><text x='50' y='74' font-size='62' text-anchor='middle'>%E2%98%95</text></svg>">
<title>Kopi O King</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:#1c0e04;color:#fef3c7;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  user-select:none;overflow:hidden;
}
:root{
  --bg:#1c0e04;--surf:#2d1a08;--card:#3e2510;--card-owned:#3a2010;
  --border:#4a2e0e;--border-owned:#6b3a12;
  --amber:#f59e0b;--green:#22c55e;--muted:#9c7a4a;--text:#fef3c7;
}

/* ── Offline banner ── */
#offline-banner{
  display:none;background:#7f1d1d;color:#fca5a5;
  font-size:11px;text-align:center;padding:3px 8px;flex-shrink:0;
}

/* ── Header ── */
#header{
  flex-shrink:0;background:var(--surf);
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:2px solid var(--amber);
}
#header .title{font-size:18px;font-weight:700;color:var(--amber);letter-spacing:-.3px;}
#header .sub  {font-size:11px;color:var(--muted);margin-top:2px;}
#money-display{font-size:28px;font-weight:800;color:var(--green);line-height:1;font-variant-numeric:tabular-nums;}
#cps-display  {font-size:12px;color:var(--muted);margin-top:3px;text-align:right;}

/* ── Click zone ── */
#click-zone{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:14px 16px 10px;background:#150b02;
  border-bottom:1px solid var(--border);gap:5px;
}
#cup-btn{
  position:relative;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle at 40% 38%,#6b3200 0%,#3a1800 70%);
  border:3px solid var(--amber);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .12s ease;overflow:visible;
  -webkit-user-select:none;
}
#cup-btn:active{transform:scale(.85);}
#cup-emoji{font-size:66px;line-height:1;pointer-events:none;}

/* Steam */
.steam{
  position:absolute;border-radius:50%;
  background:rgba(255,230,180,.22);pointer-events:none;
  animation:steamRise 2s ease-out infinite;
}
.s1{width:9px;height:9px;left:48px;bottom:105%;animation-delay:0s;}
.s2{width:7px;height:7px;left:76px;bottom:105%;animation-delay:.7s;}
.s3{width:6px;height:6px;left:36px;bottom:105%;animation-delay:1.4s;}

/* Float text */
#floats{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.float-txt{
  position:absolute;color:var(--amber);font-weight:800;font-size:14px;
  white-space:nowrap;pointer-events:none;
  animation:floatUp .9s ease-out forwards;
}

.tap-hint{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1px;}
#click-val{font-size:11px;color:var(--muted);}

#quick-stats{display:flex;gap:8px;width:100%;}
.stat-chip{
  flex:1;background:var(--surf);border-radius:6px;
  padding:5px 8px;font-size:11px;color:var(--muted);text-align:center;
}

/* ── Tab bar ── */
#tab-bar{
  flex-shrink:0;display:flex;border-bottom:1px solid var(--border);
  background:var(--surf);
}
.tab-btn{
  flex:1;padding:10px 0;background:transparent;border:none;
  border-bottom:2px solid transparent;color:var(--muted);
  cursor:pointer;font-size:12px;font-weight:600;
  transition:all .15s;font-family:inherit;
}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ── List ── */
#list{
  flex:1;overflow-y:auto;min-height:0;/* M8 */
  padding:8px;display:flex;flex-direction:column;gap:5px;
}
#list::-webkit-scrollbar{width:4px;}
#list::-webkit-scrollbar-track{background:var(--bg);}
#list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── Item cards ── */
.item-card{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border-radius:8px;padding:8px 10px;
  cursor:pointer;border:1px solid var(--border);transition:background .1s,opacity .2s;
}
.item-card.owned{background:var(--card-owned);border-color:var(--border-owned);}
.item-card.dim  {opacity:.35;cursor:default;pointer-events:none;}
.item-card:not(.dim):active{background:#4a2c12;}
.card-emoji{font-size:24px;width:32px;text-align:center;flex-shrink:0;}
.card-mid  {flex:1;min-width:0;}
.card-name {font-size:13px;font-weight:600;color:var(--text);}
.card-desc {font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.card-right{flex-shrink:0;text-align:right;}
.card-cost {font-size:13px;font-weight:700;}
.card-count{font-size:11px;color:var(--amber);margin-top:1px;}
.can {color:var(--green);}
.cant{color:var(--muted);}

/* ── Stats tab ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:2px 0;}
.stat-box{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.stat-box .sl{font-size:11px;color:var(--muted);}
.stat-box .sv{font-size:20px;font-weight:700;color:var(--amber);margin-top:3px;}
.save-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf);border-radius:8px;padding:10px 14px;
  border:1px solid var(--border);margin-top:6px;
}
.save-lbl{font-size:12px;color:var(--muted);}
#save-time{font-size:12px;color:var(--amber);margin-top:2px;}
.reset-btn{
  background:#5a1a10;color:#fca5a5;border:1px solid #7f2a1e;
  border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.reset-btn:active{opacity:.75;}
.stats-tip{font-size:11px;color:#5a4030;text-align:center;margin-top:8px;padding:0 4px;line-height:1.5;}

/* ── Milestone toast ── */
#ms-toast{
  display:none;position:fixed;bottom:20px;left:50%;
  background:var(--surf);border:2px solid var(--amber);border-radius:12px;
  padding:10px 18px;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;z-index:200;max-width:92%;pointer-events:none;
}
#ms-toast.show{display:flex;animation:msToast 3.5s ease forwards;}

/* ── Offline earnings toast ── */
#oe-toast{
  display:none;position:fixed;bottom:20px;left:50%;
  background:#1a3a1a;border:2px solid var(--green);border-radius:12px;
  padding:10px 18px;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:#bbf7d0;
  white-space:nowrap;z-index:200;max-width:92%;pointer-events:none;
}
#oe-toast.show{display:flex;animation:msToast 4s ease forwards;}

/* ── Animations ── */
@keyframes floatUp{
  0%  {opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-54px);}
}
@keyframes steamRise{
  0%  {opacity:.45;transform:translateY(0)scaleX(1);}
  100%{opacity:0;  transform:translateY(-38px)scaleX(2);}
}
@keyframes msToast{
  0%  {opacity:0;transform:translate(-50%,8px);}
  12% {opacity:1;transform:translate(-50%,0);}
  80% {opacity:1;transform:translate(-50%,0);}
  100%{opacity:0;transform:translate(-50%,-6px);}
}

/* ── Onboarding ── */
#onboard{
  position:fixed;inset:0;z-index:500;
  display:none;flex-direction:column;overflow:hidden;
  transition:opacity .4s ease;
}
#onboard::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.15) 3px,rgba(0,0,0,.15) 4px);
}
.ob-slide{
  position:absolute;inset:0; /* M12 */
  display:flex;flex-direction:column;align-items:center;
  padding:24px 20px 16px;
  opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:1;
}
.ob-slide.active{opacity:1;pointer-events:all;}
.ob-top{display:flex;justify-content:center;flex-shrink:0;}
.ob-badge{
  font-size:10px;font-weight:700;letter-spacing:3px;color:#22d3ee;
  text-transform:uppercase;background:rgba(34,211,238,.08);
  border:1px solid rgba(34,211,238,.3);padding:4px 14px;border-radius:3px;
}
.ob-art{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;min-height:0;padding:12px 0;
}
.ob-art svg{
  image-rendering:pixelated;image-rendering:crisp-edges;
  max-height:220px;max-width:min(280px,90vw);
  width:auto;height:auto;display:block;
}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ob-art-anim svg{animation:artPulse 2.2s ease-in-out infinite;}
.ob-text{flex-shrink:0;text-align:center;padding:0 4px;}
.ob-big-title{
  font-size:30px;font-weight:800;letter-spacing:3px;color:#f59e0b;
  text-transform:uppercase;margin-bottom:6px;
  text-shadow:0 0 24px rgba(245,158,11,.4);
}
.ob-sub{font-size:11px;letter-spacing:4px;color:#9c7a4a;text-transform:uppercase;}
.ob-title{
  font-size:12px;font-weight:700;letter-spacing:2.5px;
  color:#f59e0b;text-transform:uppercase;margin-bottom:10px;
}
.ob-story{font-size:14px;color:#fef3c7;line-height:1.7;max-width:300px;margin:0 auto;}
.ob-nav{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;margin-top:18px;flex-shrink:0;
}
.ob-skip{
  background:transparent;border:1px solid #2a1a0a;color:#5a3a1a;
  font-size:12px;padding:9px 16px;border-radius:6px;cursor:pointer;font-family:inherit;
}
.ob-next{
  background:#f59e0b;border:none;color:#1c0e04;font-size:13px;font-weight:700;
  padding:10px 20px;border-radius:6px;cursor:pointer;font-family:inherit;letter-spacing:.5px;
}
.ob-next:active{opacity:.8;}
.ob-dots{display:flex;gap:7px;align-items:center;}
.ob-dot{
  width:8px;height:8px;border-radius:50%;background:#1a0a04;
  border:1px solid #3a1a08;transition:all .2s;
}
.ob-dot.active{background:#f59e0b;border-color:#f59e0b;}
.replay-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:12px;padding:8px;border-radius:6px;cursor:pointer;
  font-family:inherit;width:100%;margin-top:6px;
}

/* ── Rush Hour ── */
#cup-btn.rush{
  border-color:#ef4444;
  box-shadow:0 0 28px rgba(239,68,68,.55),0 0 60px rgba(239,68,68,.18);
}
@keyframes rushPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#cup-btn.rush:not(:active){animation:rushPulse .55s ease-in-out infinite;}
#tap-hint.rush{color:#ef4444;}
#click-val.rush{color:#ef4444;}

/* ── Help / Settings ── */
.how-section{
  background:var(--card);border-radius:8px;padding:12px;
  border:1px solid var(--border);display:flex;flex-direction:column;gap:9px;
}
.how-head{
  font-size:10px;font-weight:700;letter-spacing:2px;color:var(--amber);
  text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.how-row{display:flex;gap:10px;align-items:flex-start;}
.hw-ic{font-size:18px;flex-shrink:0;width:26px;text-align:center;margin-top:2px;}
.hw-tx{font-size:13px;color:var(--text);line-height:1.5;}
.hw-tx b{color:var(--amber);}
.set-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--surf);border:1px solid var(--border);color:var(--text);
  font-size:13px;font-weight:600;padding:12px;border-radius:8px;
  cursor:pointer;font-family:inherit;width:100%;
}
.set-btn:active{opacity:.75;}
.set-btn.danger{background:#3a0a0a;border-color:#7f2a1e;color:#fca5a5;}
</style>
</head>
<body>

<div id="onboard"></div>

<div id="offline-banner">⚡ You're offline — game still works, progress is saving locally</div>

<div id="header">
  <div>
    <div class="title">☕ Kopi O King</div>
    <div class="sub">Singapore Hawker Clicker</div>
  </div>
  <div>
    <div id="money-display">$0</div>
    <div id="cps-display">$0/sec</div>
  </div>
</div>

<div id="click-zone">
  <div id="cup-btn" role="button" aria-label="Tap to brew kopi">
    <div class="steam s1"></div>
    <div class="steam s2"></div>
    <div class="steam s3"></div>
    <div id="cup-emoji">☕</div>
    <div id="floats"></div>
  </div>
  <div id="tap-hint" class="tap-hint">TAP TO BREW!</div>
  <div id="click-val">+$1 per tap</div>
  <div id="quick-stats">
    <div class="stat-chip" id="chip-items">🏪 0 items</div>
    <div class="stat-chip" id="chip-total">💰 $0 earned</div>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="items"    onclick="switchTab('items')"   >🍽️ Menu</button>
  <button class="tab-btn"        data-tab="upgrades" onclick="switchTab('upgrades')">⬆️ Upgrades</button>
  <button class="tab-btn"        data-tab="stats"    onclick="switchTab('stats')"   >📊 Stats</button>
  <button class="tab-btn"        data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
</div>

<div id="list"></div>

<div id="ms-toast"></div>
<div id="oe-toast"></div>

<script>
// ── SW registration — M3: FIRST LINE before any async ─────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Onboarding ────────────────────────────────────────────────────────────────
const OB_KEY='kok-intro-v1';

// Pixel art palette
const OB_PAL={
  A:'#f59e0b',D:'#92400e',W:'#fef3c7',K:'#1c0e04',
  S:'#78716c',R:'#dc2626',Y:'#fbbf24',C:'#22d3ee',
  M:'#292524',L:'#e2d9c8',B:'#1d4ed8',P:'#7c3aed',
};

// Render a string-array pixel sprite to SVG
function renderPx(rows,px){
  const H=rows.length,W=Math.max(...rows.map(r=>r.length));
  let o=`<svg viewBox="0 0 ${W*px} ${H*px}" xmlns="http://www.w3.org/2000/svg">`;
  for(let y=0;y<H;y++)for(let x=0;x<rows[y].length;x++){
    const c=rows[y][x];if(c==='.'||!OB_PAL[c])continue;
    o+=`<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${OB_PAL[c]}"/>`;
  }
  return o+'</svg>';
}

// ── Pixel sprites (12–13 wide × 12–13 tall, px=10 → ~120×130 px) ────────────

// Slide 1: Kopi cup with steam (13×12)
const CUP_ART=[
  '.....CC.CC...',
  '......C.C....',
  '.............',
  '....AAAAAAA..',
  '...AAAAAAAAA.',
  '...A.MMMMMA.A',
  '...A.MMMMMA..',
  '...A.MMMMMA.A',
  '...A.MMMMMA..',
  '...AAAAAAAAA.',
  '....AAAAAAA..',
  '..AAAAAAAAAAA',
];

// Slide 2: Uncle Ah Kow — apron, smile, chunky sprite (12×13)
const UNCLE_ART=[
  '....DDDD....',
  '...DDDDDD...',
  '...DDDDDD...',
  '...DMDDMD...',
  '...DDDDDD...',
  '....MDDM....',
  '..DDDDDDDD..',
  '..WWWWWWWW..',
  '.WWWWWWWWWW.',
  '.WWWWWWWWWW.',
  '..WWWWWWWW..',
  '..SS....SS..',
  '..KK....KK..',
];

// Slide 3: The Ang Moh Inspector — beret, blue suit, red tie (12×13)
const INSP_ART=[
  '..PPPPPPPP..',
  '...PPPPPP...',
  '...LLLLLL...',
  '...LMLLML...',
  '...LLLLLL...',
  '....MLLM....',
  '..BBBBBBBB..',
  '..B.LLLL.B..',
  '..B.RRRR.B..',
  '..BBBBBBBB..',
  '..SS....SS..',
  '..SS....SS..',
  '..KK....KK..',
];

// Slide 4: Gold trophy with cyan sparkles (12×12)
const TROPHY_ART=[
  '...CC..CC...',
  '..C......C..',
  '...CC..CC...',
  '............',
  '....AAAA....',
  '...AAAAAA...',
  '..AAAAAAAA..',
  '..A.YYYY.A..',
  '..AAAAAAAA..',
  '...AAAAAA...',
  '....AAAA....',
  '.AAAAAAAAAA.',
];

const SLIDES=[
  {
    bg:'#050512',badge:'✦ SEGA PRESENTS ✦',
    art:CUP_ART,anim:true,
    bigTitle:'KOPI O KING',sub:'A Singapore Hawker Epic',story:null,
  },
  {
    bg:'#0a0400',badge:'● YEAR 1965 ●',
    art:UNCLE_ART,
    title:'UNCLE AH KOW',
    story:'Last grandson of a Hokkien kopi master.\nHis kopi so shiok, even Pulau Ubin fishermen took a bumboat just to drink one cup.',
  },
  {
    bg:'#06000e',badge:'⚠ DANGER INCOMING ⚠',
    art:INSP_ART,
    title:'THE ANG MOH INSPECTOR',
    story:'One boh liao Tuesday, a mysterious ang moh arrived with a small red book.\n"I am from Michelin," he said.\nWalao eh. You sell tyre meh?',
  },
  {
    bg:'#020a04',badge:'▶ PLAYER 1 READY ◀',
    art:TROPHY_ART,
    title:'YOUR TURN, CHAMP',
    story:'Uncle Ah Kow retire liao. The stall is yours.\nTap. Brew. Hire aunties. Conquer Singapore.\nBecome the KOPI O KING.',
    last:true,
  },
];

function buildOnboarding(){
  const el=document.getElementById('onboard');
  el.innerHTML=SLIDES.map((s,i)=>{
    const svg=renderPx(s.art,10);
    const artCls='ob-art'+(s.anim?' ob-art-anim':'');
    const textHtml=s.bigTitle
      ?`<div class="ob-big-title">${s.bigTitle}</div><div class="ob-sub">${s.sub}</div>`
      :`<div class="ob-title">${s.title}</div><div class="ob-story">${s.story.replace(/\n/g,'<br>')}</div>`;
    const dots=SLIDES.map((_,j)=>`<div class="ob-dot${j===i?' active':''}"></div>`).join('');
    const nextFn=s.last?'closeOnboard()':`obNext(${i})`;
    const nextTxt=s.last?'START PLAYING ▶':'NEXT ▶';
    return `<div class="ob-slide${i===0?' active':''}" id="ob-${i}" style="background:${s.bg};">
      <div class="ob-top"><span class="ob-badge">${s.badge}</span></div>
      <div class="${artCls}">${svg}</div>
      <div class="ob-text">${textHtml}</div>
      <div class="ob-nav">
        <button class="ob-skip" onclick="closeOnboard()">Skip</button>
        <div class="ob-dots">${dots}</div>
        <button class="ob-next" onclick="${nextFn}">${nextTxt}</button>
      </div>
    </div>`;
  }).join('');
}

function obNext(from){
  document.getElementById('ob-'+from).classList.remove('active');
  document.getElementById('ob-'+(from+1)).classList.add('active');
}

function closeOnboard(){
  localStorage.setItem(OB_KEY,'done');
  const el=document.getElementById('onboard');
  el.style.opacity='0';
  setTimeout(()=>{el.style.display='none';el.style.opacity='';},420);
}

function openOnboard(){
  buildOnboarding();
  const el=document.getElementById('onboard');
  el.style.display='flex';
}

// ── Game data ───────────────────────────────────────────────────────────────
const ITEMS = [
  {id:'kopi',        name:'Kopi O',          emoji:'☕', desc:'Classic Singapore black coffee',        baseCost:15,       baseCps:0.1   },
  {id:'toast',       name:'Kaya Toast',       emoji:'🍞', desc:'Kaya & butter on crispy bread',         baseCost:100,      baseCps:0.5   },
  {id:'teh',         name:'Teh Tarik',        emoji:'🧋', desc:'Pulled milk tea — very frothy',          baseCost:500,      baseCps:2     },
  {id:'nasilemak',   name:'Nasi Lemak',       emoji:'🍚', desc:'Coconut rice + sambal + ikan bilis',     baseCost:2000,     baseCps:8     },
  {id:'chickenrice', name:'Chicken Rice',     emoji:'🐓', desc:'Hainanese classic, queue every day!',   baseCost:8000,     baseCps:30    },
  {id:'ckwt',        name:'Char Kway Teow',   emoji:'🍜', desc:'Wok hei! Big fire only lah',            baseCost:30000,    baseCps:100   },
  {id:'laksa',       name:'Laksa',            emoji:'🍲', desc:'Katong style spicy coconut noodles',    baseCost:100000,   baseCps:350   },
  {id:'satay',       name:'Satay',            emoji:'🍢', desc:'Charcoal skewers + peanut sauce',       baseCost:400000,   baseCps:1200  },
  {id:'chillicrab',  name:'Chilli Crab',      emoji:'🦀', desc:"Singapore's most famous dish!",         baseCost:1500000,  baseCps:4500  },

// ── State ───────────────────────────────────────────────────────────────────
const gs = {

  playTime:0,
  highCps:0,
  savedAt:null,
  tab:'items',

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(1)+'T';
  if(n>=1e9) return(n/1e9).toFixed(1)+'B';
  if(n>=1e6) return(n/1e6).toFixed(1)+'M';
  if(n>=1e3) return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
function fmtTime(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  if(h>0)return h+'h '+m+'m';
  if(m>0)return m+'m '+sc+'s';
  return sc+'s';
}
function fmtSaved(iso){
  if(!iso)return'Not saved yet';
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<10)return'Just now';
  if(d<60)return d+'s ago';
  if(d<3600)return Math.floor(d/60)+'m ago';
  return Math.floor(d/3600)+'h ago';
}
function costFor(item){
  return Math.floor(item.baseCost*Math.pow(1.15,gs.owned[item.id]||0));
}
function calcCps(){
  return ITEMS.reduce((s,it)=>s+it.baseCps*(gs.owned[it.id]||0),0)*gs.cpsMulti;
}
function clickVal(){
  return Math.max(1,gs.clickMulti*(1+calcCps()*0.05))*(rushOn?10:1);
}
function totalOwned(){
  return Object.values(gs.owned).reduce((a,b)=>a+b,0);
}

// ── IndexedDB ───────────────────────────────────────────────────────────────
let db=null;

function initDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('kokDB',1);
    req.onupgradeneeded=(e)=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('save')){  // M7
        d.createObjectStore('save',{keyPath:'id'});
      }
    };
    req.onsuccess=(e)=>{db=e.target.result;resolve();};
    req.onerror=()=>reject(req.error);
  });
}

function saveGame(){
  if(!db)return Promise.resolve();
  gs.savedAt=new Date().toISOString();
  const data={
    id:'game',
    money:gs.money, total:gs.total,
    owned:{...gs.owned},
    bought:[...gs.bought],
    clickMulti:gs.clickMulti, cpsMulti:gs.cpsMulti,
    lastMs:gs.lastMs,
    playTime:gs.playTime,
    highCps:gs.highCps,
    savedAt:gs.savedAt,
  };
  return new Promise((resolve)=>{
    const tx=db.transaction('save','readwrite');
    tx.objectStore('save').put(data);
    tx.oncomplete=resolve;
    tx.onerror=resolve;
  });
}

function loadGame(){
  if(!db)return Promise.resolve();
  return new Promise((resolve)=>{
    const tx=db.transaction('save','readonly');
    const req=tx.objectStore('save').get('game');
    req.onsuccess=()=>{
      const d=req.result;
      if(d){
        gs.money      =d.money||0;
        gs.total      =d.total||0;
        gs.owned      =d.owned||{};
        gs.bought     =new Set(d.bought||[]);
        gs.clickMulti =d.clickMulti||1;
        gs.cpsMulti   =d.cpsMulti||1;
        gs.lastMs     =d.lastMs||-1;
        gs.playTime   =d.playTime||0;
        gs.highCps    =d.highCps||0;
        gs.savedAt    =d.savedAt||null;
      }
      resolve();
    };
    req.onerror=resolve;
  });
}

function resetGame(){
  if(!confirm('Start a new game? Your current progress will be lost.'))return;
  gs.money=0;gs.total=0;gs.owned={};gs.bought=new Set();
  gs.clickMulti=1;gs.cpsMulti=1;gs.lastMs=-1;
  gs.playTime=0;gs.highCps=0;gs.savedAt=null;
  saveGame();
  renderList();
  renderUI();
}

// ── Offline earnings ─────────────────────────────────────────────────────────
function calcOfflineEarnings(savedIso){
  if(!savedIso)return 0;
  const seconds=Math.min((Date.now()-new Date(savedIso))/1000,7200); // max 2h
  return calcCps()*seconds;
}

// ── Game actions ─────────────────────────────────────────────────────────────
function brewKopi(e){
  e.preventDefault();
  const v=clickVal();
  gs.money+=v;gs.total+=v;
  const btn=document.getElementById('cup-btn');
  const rect=btn.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const el=document.createElement('div');
  el.className='float-txt';
  el.style.left=(cx-rect.left-20)+'px';
  el.style.top =(cy-rect.top-10)+'px';
  el.textContent='+$'+fmt(v);
  document.getElementById('floats').appendChild(el);
  setTimeout(()=>{try{el.parentNode&&el.parentNode.removeChild(el);}catch(ex){}},920);
  renderUI();
}

function buyItem(itemId){
  const item=ITEMS.find(it=>it.id===itemId);
  if(!item)return;
  const cost=costFor(item);
  if(gs.money<cost)return;
  gs.money-=cost;
  gs.owned[itemId]=(gs.owned[itemId]||0)+1;
  renderList();
  renderUI();
}

function buyUpgrade(upgId){
  const upg=UPGRADES.find(u=>u.id===upgId);
  if(!upg||gs.bought.has(upgId)||gs.money<upg.cost)return;
  gs.money-=upg.cost;
  gs.bought.add(upgId);
  gs.clickMulti*=upg.cm;
  gs.cpsMulti  *=upg.pm;
  renderList();
  renderUI();
}

function switchTab(name){
  gs.tab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===name);
  });
  renderList();
}

// ── Toast system ─────────────────────────────────────────────────────────────
let msTimeout=null;

function showToast(toastId,emoji,msg){
  const el=document.getElementById(toastId);
  el.innerHTML=`<span style="font-size:20px;">${emoji}</span><span style="margin-left:8px;">${msg}</span>`;
  el.style.animation='none';
  void el.offsetWidth;
  el.classList.add('show');
  el.style.animation='';
  if(msTimeout)clearTimeout(msTimeout);
  msTimeout=setTimeout(()=>el.classList.remove('show'),3700);
}

function checkMilestone(){
  const idx=MILESTONES.reduce((b,m,i)=>gs.total>=m.at?i:b,-1);
  if(idx>gs.lastMs){
    gs.lastMs=idx;
    showToast('ms-toast',MILESTONES[idx].emoji,MILESTONES[idx].msg);
  }
}

    cvEl.className='';
  }
  document.getElementById('chip-items').textContent='🏪 '+tot+' item'+(tot===1?'':'s');
  document.getElementById('chip-total').textContent='💰 $'+fmt(gs.total)+' earned';
}

function renderList(){
  const list=document.getElementById('list');

      const cnt  =gs.owned[item.id]||0;
      const cost =costFor(item);

      const prod =cnt>0?fmt(item.baseCps*cnt*gs.cpsMulti)+'/s total':fmt(item.baseCps)+'/s ea';
      const desc =item.desc+' · '+prod;
      return `<div class="item-card${can?'':(cnt>0?' owned dim':' dim')}${cnt>0&&can?' owned':''}"
        onclick="${can?`buyItem('${item.id}')`:''}" >
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-mid">

          <div class="card-desc">${desc}</div>

        </div>

    }).join('');

  }else if(gs.tab==='upgrades'){
    list.innerHTML=UPGRADES.map(upg=>{
      const bought=gs.bought.has(upg.id);

            ?'<div style="font-size:11px;color:#5a4030;">OWNED</div>'

        </div>
      </div>`;
    }).join('');

  }else if(gs.tab==='stats'){
    renderStats();
  }else{
    renderSettings();
  }
}

// ── Rush Hour ─────────────────────────────────────────────────────────────────
let rushOn=false,rushSecs=0,rushTimer=null;

function startRush(){
  if(rushOn)return;
  rushOn=true;rushSecs=30;
  document.getElementById('cup-btn').classList.add('rush');
  const hint=document.getElementById('tap-hint');
  if(hint){hint.textContent='⚡ RUSH HOUR! 30s!';hint.className='tap-hint rush';}
  showToast('ms-toast','⚡','RUSH HOUR! Tap 10× faster — 30 seconds!');
  rushTimer=setInterval(()=>{
    rushSecs--;
    const hint=document.getElementById('tap-hint');
    if(hint&&rushOn)hint.textContent='⚡ RUSH HOUR! '+rushSecs+'s!';
    if(rushSecs<=0){endRush();}
  },1000);
}

function endRush(){
  clearInterval(rushTimer);
  rushOn=false;
  document.getElementById('cup-btn').classList.remove('rush');
  const hint=document.getElementById('tap-hint');
  if(hint){hint.textContent='TAP TO BREW!';hint.className='tap-hint';}
  showToast('ms-toast','😮','Rush hour over! Phew, good work uncle!');
  scheduleRush();
}

function scheduleRush(){
  // First event 3–5 minutes after game opens; subsequent events the same
  const delay=(180+Math.random()*120)*1000;
  setTimeout(startRush,delay);
}
let ticks=0;
function tick(){
  const earn=calcCps()/20;  // 50ms tick = 1/20 second
  gs.money+=earn;
  gs.total+=earn;
  ticks++;
  if(ticks%20===0)  gs.playTime++;         // every second
  if(ticks%200===0) saveGame();            // every 10 seconds
  if(ticks%4===0){                         // ~80ms render cadence
    renderUI();
    checkMilestone();
    if(gs.tab==='stats')renderStats();
    // settings is static — no live re-render needed
  }
}

// ── Connectivity ─────────────────────────────────────────────────────────────
window.addEventListener('online', ()=>{
  document.getElementById('offline-banner').style.display='none';
});
window.addEventListener('offline',()=>{
  document.getElementById('offline-banner').style.display='block';
});

// ── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  try{
    await initDB();
    await loadGame();
  }catch(e){
    // IDB unavailable — continue without save (private browsing etc.)
  }

  // Offline earnings
  const oe=calcOfflineEarnings(gs.savedAt);
  if(oe>10){
    gs.money+=oe;
    gs.total+=oe;
    setTimeout(()=>{
      showToast('oe-toast','💰','Welcome back! Earned $'+fmt(oe)+' while away');
    },600);
  }

  // Attach click + touch events to cup
  const cup=document.getElementById('cup-btn');
  cup.addEventListener('click',brewKopi);
  // touchstart for snappier mobile response
  cup.addEventListener('touchstart',brewKopi,{passive:false});

  renderUI();
  renderList();
  setInterval(tick,50);
  scheduleRush(); // first Rush Hour event fires 3–5 min after load

  // Show onboarding on first visit (M12: show once, localStorage flag)
  if(!localStorage.getItem(OB_KEY)){
    buildOnboarding();
    document.getElementById('onboard').style.display='flex';
  }
}

init();
